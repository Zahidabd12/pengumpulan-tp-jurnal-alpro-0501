<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Portal - Supabase</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --bg-color: #f8fafc;
      --surface: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --success: #10b981;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-main); }
    
    .navbar { background: var(--surface); padding: 1rem 2rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .navbar h2 { color: var(--primary); }
    
    .wrap { max-width: 1000px; margin: 2rem auto; padding: 0 1rem; display: flex; gap: 2rem; }
    
    /* Sidebar Menu */
    .sidebar { width: 250px; display: flex; flex-direction: column; gap: 0.5rem; }
    .menu-btn { padding: 12px 16px; background: transparent; border: 1px solid transparent; border-radius: 8px; text-align: left; font-size: 1rem; font-weight: 600; cursor: pointer; color: var(--text-muted); transition: 0.2s; }
    .menu-btn:hover { background: #e0e7ff; color: var(--primary); }
    .menu-btn.active { background: #e0e7ff; color: var(--primary); border-color: #c7d2fe; }

    /* Content Area */
    .content { flex: 1; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 2rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); display: none; }
    .card.active { display: block; }
    
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 0.5rem; }
    .std-input { width: 100%; padding: 12px 16px; border: 2px solid var(--border); border-radius: 8px; font-size: 1rem; outline: none; transition: 0.2s; font-family: inherit; }
    .std-input:focus { border-color: var(--primary); }
    textarea.std-input { resize: vertical; min-height: 120px; }
    
    .btn { padding: 12px 24px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 1rem; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; }
    .btn:hover { background: var(--primary-hover); }
    .btn:disabled { background: #cbd5e1; cursor: not-allowed; }
    .btn.success { background: var(--success); }
    .btn.success:hover { background: #059669; }
  </style>
</head>
<body>

<div class="navbar">
  <h2>⚙️ Admin Portal Praktikum</h2>
  <div style="font-weight: 600; color: var(--text-muted);">Database: Supabase</div>
</div>

<div class="wrap">
  <div class="sidebar">
    <button class="menu-btn active" onclick="switchTab('tab-sesi', this)">🕒 Manajemen Sesi</button>
    <button class="menu-btn" onclick="switchTab('tab-soal', this)">📝 Tambah Soal</button>
    <button class="menu-btn" onclick="switchTab('tab-nilai', this)">💯 Penilaian Langsung</button>
  </div>

  <div class="content">
    
    <div class="card active" id="tab-sesi">
      <h3 style="margin-bottom: 1.5rem; border-bottom: 2px solid var(--border); padding-bottom: 0.5rem;">Konfigurasi Waktu Sesi</h3>
      <form onsubmit="submitData(event, 'saveSesi')">
        <div class="form-group">
          <label>Nama Sesi (Contoh: Sesi 1)</label>
          <input type="text" class="std-input" id="inp-sesi-name" required>
        </div>
        <div class="form-group">
          <label>Waktu Mulai (Start Time)</label>
          <input type="datetime-local" class="std-input" id="inp-sesi-start" required>
        </div>
        <div class="form-group">
          <label>Waktu Selesai (End Time)</label>
          <input type="datetime-local" class="std-input" id="inp-sesi-end" required>
        </div>
        <button type="submit" class="btn">Simpan Jadwal Sesi</button>
      </form>
    </div>

    <div class="card" id="tab-soal">
      <h3 style="margin-bottom: 1.5rem; border-bottom: 2px solid var(--border); padding-bottom: 0.5rem;">Bank Soal Ujian</h3>
      <form onsubmit="submitData(event, 'saveSoal')">
        <div class="form-group">
          <label>Pilih Sesi (Contoh: Sesi 1)</label>
          <input type="text" class="std-input" id="inp-soal-sesi" required>
        </div>
        <div style="display: flex; gap: 1rem;">
          <div class="form-group" style="flex: 1;">
            <label>Nomor Soal</label>
            <input type="number" class="std-input" id="inp-soal-no" required>
          </div>
          <div class="form-group" style="flex: 2;">
            <label>URL Gambar (Opsional)</label>
            <input type="url" class="std-input" id="inp-soal-img" placeholder="https://...">
          </div>
        </div>
        <div class="form-group">
          <label>Teks Soal (Bisa menggunakan Markdown/LaTeX $$)</label>
          <textarea class="std-input" id="inp-soal-text" required></textarea>
        </div>
        <button type="submit" class="btn">Tambah ke Bank Soal</button>
      </form>
    </div>

    <div class="card" id="tab-nilai">
      <h3 style="margin-bottom: 1.5rem; border-bottom: 2px solid var(--border); padding-bottom: 0.5rem;">Input Nilai Praktikan</h3>
      <form onsubmit="submitData(event, 'saveNilai')">
        <div style="display: flex; gap: 1rem;">
          <div class="form-group" style="flex: 1;">
            <label>NIM Praktikan</label>
            <input type="text" class="std-input" id="inp-nilai-nim" required>
          </div>
          <div class="form-group" style="flex: 1;">
            <label>Sesi</label>
            <input type="text" class="std-input" id="inp-nilai-sesi" required>
          </div>
        </div>
        <div class="form-group">
          <label>Nilai Akhir (0-100)</label>
          <input type="number" class="std-input" id="inp-nilai-skor" min="0" max="100" required>
        </div>
        <div class="form-group">
          <label>Catatan Asisten (Opsional)</label>
          <textarea class="std-input" id="inp-nilai-catatan" style="min-height: 80px;"></textarea>
        </div>
        <div style="display: flex; gap: 1rem;">
          <button type="submit" class="btn success" style="flex: 1;">Simpan Nilai</button>
          <button type="button" class="btn" style="flex: 1; background: #0f172a;" onclick="exportNilaiCSV()">📊 Download Rekap Nilai (CSV)</button>
        </div>
      </form>
    </div>

  </div>
</div>

<script>
  // ==========================================
  // 1. KONFIGURASI SUPABASE (WAJIB DIISI)
  // ==========================================
  // --- KONFIGURASI SUPABASE ---
const SUPABASE_URL = 'https://lbpliaujrmovkbeuabrh.supabase.co';
const SUPABASE_KEY = 'sb_publishable_BpzuBXSNG5u4eJU14KJeZg_CGGtP4UN';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // ==========================================
  // 2. FUNGSI PINDAH TAB MENU
  // ==========================================
  function switchTab(tabId, btnElement) {
    document.querySelectorAll('.card').forEach(card => card.classList.remove('active'));
    document.querySelectorAll('.menu-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    btnElement.classList.add('active');
  }

  // ==========================================
  // 3. FUNGSI SIMPAN DATA KE SUPABASE
  // ==========================================
  async function submitData(event, actionType) {
    event.preventDefault();
    const btn = event.target.querySelector('button[type="submit"]');
    const originalText = btn.innerText;
    btn.innerText = "Menyimpan... ⏳";
    btn.disabled = true;

    try {
      let result;

      if (actionType === 'saveSesi') {
        const payload = {
          nama_sesi: document.getElementById('inp-sesi-name').value,
          waktu_mulai: document.getElementById('inp-sesi-start').value,
          waktu_selesai: document.getElementById('inp-sesi-end').value
        };
        // Asumsi kamu sudah buat tabel 'Sesi' di Supabase
        result = await supabase.from('Sesi').insert([payload]); 
      } 
      
      else if (actionType === 'saveSoal') {
        const payload = {
          sesi: document.getElementById('inp-soal-sesi').value,
          no_soal: document.getElementById('inp-soal-no').value,
          url_gambar: document.getElementById('inp-soal-img').value,
          teks_soal: document.getElementById('inp-soal-text').value
        };
        // Asumsi kamu sudah buat tabel 'Soal' di Supabase
        result = await supabase.from('Soal').insert([payload]);
      } 
      
      else if (actionType === 'saveNilai') {
        const payload = {
          nim: document.getElementById('inp-nilai-nim').value,
          sesi: document.getElementById('inp-nilai-sesi').value,
          skor: document.getElementById('inp-nilai-skor').value,
          catatan: document.getElementById('inp-nilai-catatan').value
        };
        // Asumsi kamu sudah buat tabel 'Nilai' di Supabase
        result = await supabase.from('Nilai').insert([payload]);
      }

      if (result.error) throw result.error;

      alert("✅ Data berhasil disimpan ke database!");
      event.target.reset(); // Kosongkan form setelah sukses

    } catch (error) {
      alert("❌ Gagal menyimpan: " + error.message);
    } finally {
      btn.innerText = originalText;
      btn.disabled = false;
    }
  }

  // ==========================================
  // 4. FUNGSI EXPORT DATA KE CSV/EXCEL
  // ==========================================
  async function exportNilaiCSV() {
    const btn = document.querySelector('button[onclick="exportNilaiCSV()"]');
    const originalText = btn.innerText;
    btn.innerText = "Mendownload... ⏳";
    btn.disabled = true;

    try {
      // Ambil semua data dari tabel 'Nilai'
      const { data, error } = await supabase.from('Nilai').select('*');
      
      if (error) throw error;
      if (!data || data.length === 0) {
        alert("⚠️ Belum ada data nilai di database.");
        return;
      }

      // Buat Header CSV
      const headers = ['ID_Data', 'NIM_Praktikan', 'Sesi_Praktikum', 'Skor_Akhir', 'Catatan_Asisten', 'Waktu_Input'];
      
      // Mapping data ke bentuk array untuk setiap baris
      const rows = data.map(row => [
        row.id || '', 
        row.nim || '', 
        row.sesi || '', 
        row.skor || '', 
        `"${(row.catatan || '').replace(/"/g, '""')}"`, // Handle tanda kutip/koma di dalam teks catatan
        row.created_at ? new Date(row.created_at).toLocaleString('id-ID') : ''
      ]);

      // Gabungkan header dan isi data dengan koma dan enter (\n)
      const csvContent = [headers.join(","), ...rows.map(r => r.join(","))].join("\n");

      // Proses Download File CSV
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement("a");
      const url = URL.createObjectURL(blob);
      
      link.setAttribute("href", url);
      link.setAttribute("download", `Rekap_Nilai_Praktikum_${new Date().getTime()}.csv`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);

    } catch (err) {
      alert("❌ Gagal mendownload CSV: " + err.message);
    } finally {
      btn.innerText = originalText;
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
